name: product-tests

# CI VISIBILITY for the VemCAD product layer (apps/**, services/**). NOTE: VemCAD is
# free-tier with no branch protection, so this reports red/green on PRs but does NOT
# block merge — it is visibility, not an enforced gate.
on:
  pull_request:
    paths:
      - "apps/**"
      - "services/**"
      - "package.json"
      - ".github/workflows/product_tests.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: product-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    # Submodule-free product tests (apps/runtime + services/solve). No PAT, no submodule
    # checkout — deliberately robust against the CADGAMEFUSION_PAT / private-submodule
    # fragility that has historically broken the editor-light workflow. High-value, always-on.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (no submodule)
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run product test suite (core)
        run: npm test

  web-integration:
    # The apps/web tests that import the CADGameFusion submodule (web_viewer). Isolated as a
    # separate job so a PAT/submodule problem reddens ONLY this leg, never the core suite above.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Preflight - verify CADGAMEFUSION_PAT
        env:
          CADGAMEFUSION_PAT: ${{ secrets.CADGAMEFUSION_PAT }}
        run: |
          # Fail clearly BEFORE checkout if the PAT is missing/expired, instead of the cryptic
          # "could not read Username for github.com" from the private-submodule fetch.
          if [ -z "${CADGAMEFUSION_PAT:-}" ]; then
            echo "::error title=CADGAMEFUSION_PAT missing::the CADGAMEFUSION_PAT secret is empty. Renew: gh secret set CADGAMEFUSION_PAT --repo zensgit/VemCAD"
            exit 1
          fi
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${CADGAMEFUSION_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/zensgit/CADGameFusion || true)"
          if [ "${code}" != "200" ]; then
            echo "::error title=CADGAMEFUSION_PAT invalid::token invalid/expired or lacks zensgit/CADGameFusion access (GitHub API HTTP ${code:-none}). Renew: gh secret set CADGAMEFUSION_PAT --repo zensgit/VemCAD"
            exit 1
          fi
          echo "CADGAMEFUSION_PAT OK - can read zensgit/CADGameFusion (HTTP 200)."
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CADGAMEFUSION_PAT }}
          submodules: recursive
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run web-integration tests
        run: npm run test:web
