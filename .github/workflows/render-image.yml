name: render-image

# Phase 1 A6: build the render service image (heavy render_cli compile runs
# here, not on dev machines) and smoke it. Publishes to GHCR on main.
on:
  pull_request:
    paths:
      - "services/render/**"
      - "tools/render_regression/**"     # golden set / harness used by the E2E step
      - "deps/cadgamefusion"             # submodule bump = render_cli change → rebuild
      - ".github/workflows/render-image.yml"
  push:
    branches: [main]
    paths:
      - "services/render/**"
      - "tools/render_regression/**"
      - "deps/cadgamefusion"

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # deps/cadgamefusion + its libdxfrw

      - name: Fetch OFL 仿宋/楷体 fonts (best-effort)
        run: bash services/render/tools/fetch_fonts.sh || true

      - name: Build image
        run: docker build -f services/render/Dockerfile -t vemcad-render:ci .

      - name: Font layer smoke — CJK fonts present
        run: |
          docker run --rm --entrypoint fc-list vemcad-render:ci :lang=zh \
            | tee /tmp/fc.txt
          grep -qi "noto" /tmp/fc.txt || (echo "no Noto CJK in image" && exit 1)

      - name: Service smoke — healthz + render a constructed sample
        run: |
          # --network none isolates the render (port publish would be ignored);
          # the smoke reaches uvicorn via in-container loopback through docker exec.
          # Container name must be >=2 chars (Docker rejects single-char names).
          name=vemcad_render_smoke
          docker run -d --network none --name "$name" vemcad-render:ci
          # Poll healthz; print the body regardless of status so a 503
          # (degraded) surfaces render_cli.smoke.detail instead of being swallowed.
          # Single-line probe ($'...' expands \n at runtime — keeps the YAML
          # literal block valid; a real multi-line string would break it).
          probe=$'import urllib.request,urllib.error,sys\ntry:\n print(urllib.request.urlopen("http://127.0.0.1:8077/healthz").read().decode());sys.exit(0)\nexcept urllib.error.HTTPError as e:\n print("HTTP",e.code,e.read().decode());sys.exit(1)\nexcept Exception as e:\n print("not-up:",e);sys.exit(2)'
          ok=
          for i in $(seq 1 45); do
            if docker exec "$name" python3 -c "$probe"; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "=== healthz body (final) ==="; docker exec "$name" python3 -c "$probe" || true
            echo "=== direct render_cli probe ==="
            docker exec "$name" sh -c 'printf "0\nSECTION\n2\nENTITIES\n0\nLINE\n8\n0\n10\n0\n20\n0\n11\n10\n21\n10\n0\nENDSEC\n0\nEOF\n" > /tmp/t.dxf; render_cli --input /tmp/t.dxf --out /tmp/t.png --width 200 --height 200; echo "render_cli exit=$?"' || true
            echo "=== container logs ==="; docker logs "$name"
            docker rm -f "$name"; exit 1
          fi
          # L1 /diff smoke — exercises the REAL render -> diff -> overlay path
          # in the image. Also proves the diff engine + numpy/Pillow shipped:
          # a missing dep surfaces as a 501 here, not silently in production.
          docker exec "$name" sh -c 'printf "0\nSECTION\n2\nENTITIES\n0\nLINE\n8\n0\n10\n0\n20\n0\n11\n10\n21\n10\n0\nENDSEC\n0\nEOF\n" > /tmp/t.dxf'
          docker exec "$name" python3 /app/diff_smoke.py http://127.0.0.1:8077 /tmp/t.dxf \
            || { echo "=== diff smoke failed; container logs ==="; docker logs "$name"; docker rm -f "$name"; exit 1; }
          docker rm -f "$name"

      - name: Golden end-to-end — render each golden via the image, check non-blank + determinism
        run: |
          mkdir -p /tmp/golden_out
          # Render inside the container (it has render_cli + Qt + fonts); the
          # golden DXFs + driver are mounted read-only; output to a host volume.
          docker run --rm --network none \
            -v "$PWD/tools/render_regression:/rr:ro" \
            -v /tmp/golden_out:/out \
            --entrypoint python3 vemcad-render:ci \
            /rr/ci_render_golden.py --golden /rr/golden/golden.json \
              --golden-dir /rr/golden --out /out --passes 2
          # Host-side compare/non-blank/determinism (numpy/PIL).
          python3 -m pip install -q numpy pillow
          python3 tools/render_regression/ci_e2e_check.py \
            --golden tools/render_regression/golden/golden.json --render-dir /tmp/golden_out

      - name: Sheet-readiness audit E2E (blocking) — run the audit tool over the golden corpus
        # BLOCKING (no continue-on-error): verified green on the real heavy gate in #125
        # ([sheet-audit] OK total=7 rendered_ok=7), so a broken/unverified audit now FAILS the
        # build — the Phase-A→B flip (same pattern as the pact gate). Mirrors the service-smoke
        # wiring (--network none + docker exec via in-container loopback). The image ships
        # numpy/Pillow (services/render/requirements.txt), so the audit analysis runs in-container.
        # SCOPE: this is a TOOL plumbing/regression signal — the audit runs end-to-end and emits
        # a well-formed summary.json over the committed corpus — NOT a "view=sheet is ready to be
        # default" verdict: the golden set is render-regression material (it intentionally includes
        # garbage_extents / degenerate fixtures), so a real readiness verdict needs a curated sheet
        # corpus with known expectations (follow-up A1a-2; see the A1a DEV_AND_VERIFICATION doc).
        # Outage revert: restore `continue-on-error: true` here if a render/CI outage wedges the gate.
        run: |
          name=vemcad_sheet_audit
          docker run -d --network none --name "$name" vemcad-render:ci
          probe=$'import urllib.request,sys\ntry:\n urllib.request.urlopen("http://127.0.0.1:8077/healthz").read();sys.exit(0)\nexcept Exception:\n sys.exit(1)'
          ok=
          for i in $(seq 1 45); do
            if docker exec "$name" python3 -c "$probe"; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "render service did not come up"; docker logs "$name"; docker rm -f "$name"; exit 1; fi
          # Bring the (uncopied) audit tool + the committed golden corpus into the container.
          docker cp services/render/tools/sheet_readiness_audit.py "$name:/app/sheet_readiness_audit.py"
          docker cp tools/render_regression/golden "$name:/golden"
          # The audit exits nonzero when any drawing fails (expected for the regression corpus,
          # which intentionally includes garbage/degenerate inputs) — capture, do NOT gate on it.
          docker exec "$name" python3 /app/sheet_readiness_audit.py \
            --input-dir /golden --out-dir /tmp/audit_out --base-url http://127.0.0.1:8077 || true
          # Real assertion: >=5 goldens rendered BOTH views through /render with NO exception
          # (error is None AND both PNGs present). A schema+count check alone would pass even if
          # /render failed on all 7 — the audit records each render exception as a status="fail"
          # row WITH the summary still written, so counting error-free render pairs is what proves
          # the real render path ran (the false-green this line exists to catch).
          docker exec "$name" python3 -c "import json; s=json.load(open('/tmp/audit_out/summary.json')); assert s['schema']=='vemcad.sheet_readiness_audit/v1', s.get('schema'); res=s['results']; ok=sum(1 for r in res if r.get('error') is None and r.get('extents_png') and r.get('sheet_png')); assert ok>=5, 'only %d/%d goldens rendered both views without error (real /render path not exercised)' % (ok, len(res)); print('[sheet-audit] OK total=%d rendered_ok=%d' % (len(res), ok))" \
            || { echo '=== sheet-audit summary assertion failed; container logs ==='; docker logs "$name"; docker rm -f "$name"; exit 1; }
          docker rm -f "$name"

      - name: Semantic-class provenance E2E — render fixture, assert dimension+hatch+insert_text populate
        # The real per-PR CI gate for render_cli's semantic class provenance (the
        # CADGF ctest is local-only — CADGF CI does not build render_cli). Renders
        # the in-submodule synthetic fixture (a *D dimension + a block-nested SOLID
        # hatch + INSERT text) through the image's real Linux render_cli and asserts
        # all three provenance-derived classes are non-zero. Guards the import-path
        # geometry/text-only fallback that this submodule bump fixes.
        run: |
          mkdir -p /tmp/sem_out
          docker run --rm --network none \
            -v "$PWD/deps/cadgamefusion/tests/plugin_data:/fix:ro" \
            -v /tmp/sem_out:/out \
            --entrypoint render_cli vemcad-render:ci \
            --input /fix/render_cli_semantic_sample.dxf --out /out/sem.png \
            --report /out/sem.json --class-mask-out /out/sem_mask.png \
            --width 800 --height 600 --bg white
          python3 -c "import json,sys; c=json.load(open('/tmp/sem_out/sem.json'))['semantic_classes']['entity_counts']; print('entity_counts:', c); bad=[k for k in ('dimension','hatch','insert_text') if c.get(k,0)<=0]; sys.exit('FAIL: semantic classes %s are zero (render_cli import-path provenance regressed)'%bad) if bad else print('[semantic-provenance] OK', {k:c[k] for k in ('dimension','hatch','insert_text')})"

      - name: Push to GHCR (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          REPO=ghcr.io/${{ github.repository_owner }}/vemcad-render
          SHA_TAG="$REPO:$(git rev-parse --short HEAD)"   # immutable, for pinned rollbacks
          MAIN_TAG="$REPO:main"                           # moving "latest main" tag the deploy compose tracks
          docker tag vemcad-render:ci "$SHA_TAG"
          docker tag vemcad-render:ci "$MAIN_TAG"
          docker push "$SHA_TAG"
          docker push "$MAIN_TAG"
