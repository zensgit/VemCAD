<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Temporary VemCAD image bridge for CADGameFusion render_cli.

    CADGF currently carries macOS-specific song/fangsong family names such as
    STFangsong/STSong on imported empty-style DXF text. Linux fontconfig does
    not know those families and silently resolves them to DejaVu Sans. Keep the
    image green by mapping only the song/fangsong aliases to CJK serif families.
    Do not alias STHeiti/STXihei here: those are sans/black families and need a
    CADGF-side portable-family fix instead.
  -->

  <match target="pattern">
    <test name="family" compare="eq">
      <string>STFangsong</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Zhuque Fangsong</string>
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq">
      <string>STSong</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif CJK SC</string>
      <string>Source Han Serif SC</string>
    </edit>
  </match>
</fontconfig>
