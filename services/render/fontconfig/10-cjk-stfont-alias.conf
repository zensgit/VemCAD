<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Residual VemCAD image bridge for CADGameFusion render_cli.

    The empty-style path is now fixed at the CADGF importer (#410 / VemCAD #99):
    empty/unknown-style DXF text no longer carries STFangsong, so it resolves via
    render_cli's portable defaultTextFamily() and this image no longer needs an
    STFangsong alias (removed here).

    STSong remains: an EXPLICIT SimSun/宋体 text style still maps to the macOS
    family STSong at the importer (resolveFontFamily's known mappings, left
    unchanged by #410), which Linux fontconfig does not know. Keep mapping it to a
    CJK serif until a CADGF follow-up normalizes those explicit known mappings too;
    then this alias can go. Do not alias STHeiti/STXihei here (sans/black — they
    need a CADGF-side portable-family fix instead).
  -->

  <match target="pattern">
    <test name="family" compare="eq">
      <string>STSong</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif CJK SC</string>
      <string>Source Han Serif SC</string>
    </edit>
  </match>
</fontconfig>
